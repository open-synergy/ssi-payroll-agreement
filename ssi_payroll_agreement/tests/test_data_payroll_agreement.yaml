      - step: "Create input line for payslip test agreement"
        action: "create"
        model: "payroll_agreement_input"
        save_as: "input_line"
        values:
          payroll_agreement_id: "EVAL: registry['agreement'].id"
          input_type_id: "EVAL: registry['input_type'].id"
          amount: 1000.0

      - step: "Confirm payroll agreement for payslip test"
        action: "call"
        target: "agreement"
