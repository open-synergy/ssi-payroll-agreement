          payroll_agreement_id:
            type: "value"
            operator: "is_truthy"

      - step: "Compute payslip"
        action: "call"
        target: "payslip"
        method: "action_compute_payslip"
        as_user: "base.user_admin"

      - step: "Invalidate cache after compute"
        action: "call"
        target: "payslip"
        method: "invalidate_cache"

      - step: "Assert payslip has lines after compute"
        action: "assert"
        target: "payslip"
        asserts:
          line_ids:
            type: "o2m"
            check: "count"
            expected_count: 1

  - name: "Payroll Agreement - Restart workflow"
    steps:
      - step: "Create salary structure for restart test"
        action: "create"
        model: "hr.salary_structure"
        save_as: "salary_structure"
        values:
          name: "PA Restart Test Structure"
          code: "PARSTSTR"

      - step: "Create payroll agreement type for restart test"
        action: "create"
        model: "payroll_agreement_type"
        save_as: "agreement_type"
        values:
          name: "PA Restart Test Type"
          code: "PARSTTYPE"

      - step: "Create employee for restart test"
        action: "create"
        model: "hr.employee"
        save_as: "employee"
        values:
          name: "PA Restart Test Employee"

      - step: "Create payroll agreement for restart test"
        action: "create"
        model: "payroll_agreement"
        save_as: "agreement"
        as_user: "base.user_admin"
        values:
          employee_id: "EVAL: registry['employee'].id"
          type_id: "EVAL: registry['agreement_type'].id"
          salary_structure_id: "EVAL: registry['salary_structure'].id"
          date: 2025-02-01

      - step: "Confirm agreement for restart test"
        action: "call"
        target: "agreement"
        method: "action_confirm"
        as_user: "base.user_admin"
        asserts:
          state:
            type: "value"
            expected: "confirm"

      - step: "Invalidate cache after confirm"
        action: "call"
        target: "agreement"
        method: "invalidate_cache"

      - step: "Restart agreement to draft"
        action: "call"
        target: "agreement"
        method: "action_restart"
        as_user: "base.user_admin"
        context:
          bypass_policy_check: true
        asserts:
          state:
            type: "value"
            expected: "draft"
