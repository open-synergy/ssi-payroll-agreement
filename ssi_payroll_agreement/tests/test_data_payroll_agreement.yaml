          debit_account_id: "EVAL: registry['debit_account'].id"
          credit_account_id: "EVAL: registry['credit_account'].id"
          condition_python: "result = True"
          amount_python: "result = 1000.0"
          sequence: 10

      - step: "Create salary structure for payslip test"
        action: "create"
        model: "hr.salary_structure"
        save_as: "salary_structure"
        values:
          name: "PA Payslip Test Structure"
          code: "PAPSLSTR"
          rule_ids:
            - "EVAL: registry['salary_rule'].id"

      - step: "Create payslip type"
        action: "create"
        model: "hr.payslip_type"
        save_as: "payslip_type"
        values:
          name: "PA Test Payslip Type"
          code: "PAPSLTYPE"
          journal_id: "EVAL: registry['journal'].id"

      - step: "Create payroll agreement type for payslip test"
        action: "create"
        model: "payroll_agreement_type"
        save_as: "agreement_type"
        values:
          name: "PA Payslip Test Agreement Type"
          code: "PAPSLAT"

      - step: "Create payroll agreement input type for payslip test"
        action: "create"
